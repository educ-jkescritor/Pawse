<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../index.css">
    <link rel="stylesheet" href="timer.css">
</head>
<body>
    <header class="main-titlebar">
        <div class="title">
            <button id="menu-btn">
                <img src="../../assets/logos/logo.png" alt="pawse-logo">
            </button>
            <div class="title-roller font-pixel-16-bold">
                <div class="roller-content">
                    <div class="roller-text">PAWSE</div>
                    <div class="roller-text">SETTINGS</div>
                </div>
            </div>
        </div>
        <div class="main-window-controls">
            <button id="minimize-btn">
                <img src="../../assets/icons/minimize-btn.png" alt="minimize">
            </button>
            <button id="resize-btn">
                <img src="../../assets/icons/decrease-btn.png" alt="decrease">
            </button>
            <button id="close-btn">
                <img src="../../assets/icons/close-btn.png" alt="close">
            </button>
        </div>
    </header>

    <div class="main-content">
        <div id="timer-container">
            <span id="timer-display" class="font-pixel-64-bold">00:00</span>
        </div>

        <div class="session-counter">
            <span class="fish-icon"></span>
            <span class="fish-icon"></span>
            <span class="fish-icon"></span>
            <span class="fish-icon"></span>
        </div>

        <div class="cat-area">
            <div id="cat-sprite" class="cat-sprite"></div>
            <div id="chat-bubble" class="chat-bubble hidden">
                <p id="chat-text" class="font-inter-12-regular"></p>
            </div>
        </div>

        <div class="timer-controls">
            <button id="restore-btn" class="restore-btn" title="Restore Size">
                <img src="../../assets/icons/increase-btn.png" alt="Restore">
            </button>
            <button id="sound-btn" title="Toggle Sound">
                <img src="../../assets/icons/soundoff-btn.png" alt="Sound" id="sound-icon">
            </button>
            <button id="play-btn" title="Play/Pause">
                <img src="../../assets/icons/pause-btn.png" alt="Play/Pause" id="play-icon">
            </button>
            <button id="skip-btn" title="Skip">
                <img src="../../assets/icons/skip-btn.png" alt="Skip">
            </button>
        </div>
    </div>

    <div id="modal-overlay" class="hidden">
        <div class="custom-dialog">
            <div class="text-container">
                <p id="dialog-title" class="font-inter-20-semibold">Dialog Title</p>
                <p id="dialog-message" class="font-inter-12-regular">Dialog Message</p>
            </div>
            <button id="dialog-btn" class="confirmation_button font-inter-12-medium">Button</button>
        </div>
    </div>

    <div id="resize-modal-overlay" class="hidden">
        <div class="custom-dialog">
            <p id="select-mode" class="font-inter-16-medium">Select Mode</p>
            <div class="resize-options">
                <button id="timer-only" class="confirmation_button font-inter-12-medium">Timer Only</button>
                <button id="cat-only" class="confirmation_button font-inter-12-medium">Cat Only</button>
            </div>
        </div>
    </div>

    <script src="timer.js"></script>
    <script src="../titlebar.js"></script>
</body>
</html>
