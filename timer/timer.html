<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../index.css">
    <link rel="stylesheet" href="timer.css">
</head>
<body>
    <header class="main-titlebar">
        <div class="main-sidebar">
            <button id="settings-btn">O</button>
        </div>
        <div class="app-title">PAWSE</div>
        <div class="main-window-controls">
            <button id="minimize-btn">
                <img src="../assets/icons/minimize-btn.png" alt="minimize">
            </button>
            <button id="resize-btn">
                <img src="../assets/icons/decrease-btn.png" alt="decrease">
            </button>
            <button id="close-btn">
                <img src="../assets/icons/close-btn.png" alt="close">
            </button>
        </div>
    </header>

    <div class="main-content">
        <div id="timer-container">
            <span class="font-pixel-64-bold">00:00</span>
        </div>

        <div class="session-counter">
            <span class="fish-icon">🐟︎</span>
            <span class="fish-icon">🐟︎</span>
            <span class="fish-icon">🐟︎</span>
            <span class="fish-icon">🐟︎</span>
        </div>

        <div class="cat-area">

        </div>

        <div class="timer-controls">
            <button id="sound-btn">SOUND: OFF</button>
            <button id="play-btn">PAUSE</button>
            <button id="skip-btn">SKIP</button>
        </div>
    </div>

    <script src="timer.js"></script>
    <script src="../titlebar.js"></script>
</body>
</html>
