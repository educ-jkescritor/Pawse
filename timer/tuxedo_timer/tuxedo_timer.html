<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../../index.css">
    <link rel="stylesheet" href="tuxedo_timer.css">
</head>
<body>
    <header class="main-titlebar">
        <div class="main-sidebar">
            <button id="settings-btn">O</button>
        </div>
        <div class="app-title">PAWSE</div>
        <div class="main-window-controls">
            <button id="minimize-btn">_</button>
            <button id="maximize-btn">□</button>
            <button id="close-btn">X</button>
        </div>
    </header>
    <h1 id="tuxedo_timer">25:00</h1>
    <div class="session-counter">
        <span class="fish-icon">🐟︎</span>
        <span class="fish-icon">🐟︎</span>
        <span class="fish-icon">🐟︎</span>
        <span class="fish-icon">🐟︎</span>
    </div>
    <div class="timer-controls">
        <button id="sound-btn">
            <img src="../../assets/icons/soundoff-btn.png" alt="sound off">
        </button>
        <button id="play-btn">
            <img src="../../assets/icons/play-btn.png" alt="play">
        </button>
        <button id="skip-btn">
            <img src="../../assets/icons/skip-btn.png" alt="skip">
        </button>
    </div>
    <script src="tuxedo_timer.js"></script>
    <script src="../../titlebar.js"></script>
</body>
</html>
