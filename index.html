<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--<title>Document</title>-->
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <header class="main-titlebar">
        <div class="main-sidebar">
            <button id="settings-btn">O</button>
        </div>
        <div class="app-title">PAWSE</div>
        <div class="main-window-controls">
            <button id="minimize-btn">
                <img src="assets/icons/minimize-btn.png" alt="minimize">
            </button>
            <button id="close-btn">
                <img src="assets/icons/close-btn.png" alt="close">
            </button>
        </div>
    </header>
    <p class="select-description">
        <span class="medium_text">Choose your COMPANION<br></span>
        <span class="regular_text">Select a feline assistant to help you focus.</span>
    </p>
    <div class="cat_buttons">
        <button id="tuxedo_cat">
            <span class="tuxedo_info">
                <span class="medium_text">
                    Balanced
                </span>
                <span>
                    TUX
                </span>
                <span class="regular_text">
                    Quiet, attentive, and impeccably dressed. Ideal for long, deep-work sessions.
                </span>
            </span>
            <!--<span class="cat_image">
                IMAGE
            </span>-->
        </button>
        <button id="orange_cat">
            <span class="orange_info">
                <span>
                    Sprint
                </span>
                <span>
                    GINGER
                </span>
                <span>
                    A chaotic beacon of joy. Perfect for creative tasks and shorter sprints.
                </span>
            </span>
            <!--<span class="cat_image">
                image placeholder
            </span>-->
        </button>
        <button id="black_cat">
            <span class="black_info">
                <span>
                    Focused
                </span>
                <span>
                    VOID
                </span>
                <span>
                    Observes from the shadows. Excellent for analytical thinking and coding.
                </span>
            </span>
            <!--<span class="cat_image">
                image placeholder
            </span>-->
        </button>        
    </div>
    <button class="confirmation_button">Confirm Selection</button>
    <script src="index.js"></script>
    <script src="titlebar.js"></script>
</body>
</html>
