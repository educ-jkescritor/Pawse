<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--<title>Document</title>-->
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <header class="main-titlebar">
        <div class="title">
            <button id="menu-btn">
                <img src="assets/logos/pawse.png" alt="pawse-logo">
            </button>
            <div class="app-title font-pixel-16-bold">PAWSE</div>
        </div>
        <div class="main-window-controls">
            <button id="minimize-btn">
                <img src="assets/icons/minimize-btn.png" alt="minimize">
            </button>
            <button id="close-btn">
                <img src="assets/icons/close-btn.png" alt="close">
            </button>
        </div>
    </header>

    <div class="main-content">
        <div class="main-text">
            <span class="font-inter-16-medium">Choose your</span> <span class="font-pixel-20-medium text-system-blue">COMPANION</span><br>
            <span class="font-inter-10-regular text-gray">Select a feline assistant to help you focus.</span>
        </div>

        <div class="cat_buttons">
            <button id="tuxedo_cat">
                <span class="cat_info">
                    <span class="cat-label cat-label-classic font-inter-10-medium">Balanced</span>
                    <span class="font-pixel-24-bold">Tux</span>
                    <span class="font-inter-10-regular">A classic 25-minute session for steady, paced focus.</span>
                </span>
                <span class="cat_image">
                    <img src="assets/sprites/tuxedo_cat_static.png" alt="tuxedo-cat">
                </span>
            </button>

            <button id="orange_cat">
                <span class="cat_info">
                    <span class="cat-label cat-label-sprint font-inter-10-medium">Sprint</span>
                    <span class="font-pixel-24-bold">Ginger</span>
                    <span class="font-inter-10-regular">A quick 15-minute sprint for energetic, playful bursts.</span>
                </span>
                <span class="cat_image">
                    <img src="assets/sprites/orange_cat_static.png" alt="orange-cat">
                </span>
            </button>

            <button id="black_cat">
                <span class="cat_info">
                    <span class="cat-label cat-label-focused font-inter-10-medium">Focused</span>
                    <span class="font-pixel-24-bold">Void</span>
                    <span class="font-inter-10-regular">A deep 50-minute dive for quiet, uninterrupted flow.</span>
                </span>
                <span class="cat_image">
                    <img src="assets/sprites/black_cat_static.png" alt="black-cat">
                </span>
            </button>
        </div>

        <button class="confirmation_button font-inter-12-medium" disabled>Confirm Selection</button>
    </div>
    
    <script src="index.js"></script>
    <script src="titlebar.js"></script>
</body>
</html>
